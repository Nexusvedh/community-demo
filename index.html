<!DOCTYPE html>
<html>
<head>
  <title>Community Delivery System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      background: #1e293b;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .card {
      margin: 20px;
      padding: 20px;
      background: #1e293b;
      border-radius: 12px;
    }

    input {
      width: 80%;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 85%;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
    }

    .status {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .ok { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>

<body>

<header>
  🚚 Community Delivery System
</header>

<div class="card">

  <input id="villaInput" placeholder="Enter Villa Number (1–199)" />
  <button onclick="checkVilla()">Find Route</button>

  <div class="status" id="output"></div>

</div>

<script>
  function checkVilla() {
    let villa = document.getElementById("villaInput").value;
    const output = document.getElementById("output");

    const MIN = 1;
    const MAX = 199;

    if (!villa) {
      output.className = "status error";
      output.innerText = "❌ No villa entered";
      return;
    }

    if (!/^[0-9]+$/.test(villa)) {
      output.className = "status error";
      output.innerText = "❌ Invalid format (numbers only)";
      return;
    }

    villa = Number(villa);

    if (villa < MIN || villa > MAX) {
      output.className = "status error";
      output.innerText = "❌ Villa does not exist";
      return;
    }

    output.className = "status ok";
    output.innerText = "🚚 Route ready for Villa " + villa;
  }
</script>

</body>
</html>
