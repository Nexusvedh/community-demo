<!DOCTYPE html>
<html>
<head>
  <title>Community Navigation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      background: #1e293b;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .card {
      margin: 20px;
      padding: 20px;
      background: #1e293b;
      border-radius: 12px;
    }

    input {
      width: 80%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 85%;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      color: #4ade80;
    }
  </style>
</head>

<body>

<header>
  🚚 Community Navigation System
</header>

<div class="card">

  <h3>Enter Villa Number</h3>

  <input id="villaInput" placeholder="e.g. 101" />

  <button onclick="findVilla()">Find Route</button>

  <div class="result" id="output"></div>

</div>

<script>
  function findVilla() {
    const villa = document.getElementById("villaInput").value;

    if (!villa) {
      document.getElementById("output").innerText = "Please enter villa number";
      return;
    }

    document.getElementById("output").innerText =
      "Route ready for Villa " + villa + " 🚪➡️🏠";
  }
</script>

</body>
</html>
