<!DOCTYPE html>
<html>
<head>
  <title>Libdom Villas Navigation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      background: #1e293b;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    /* 🖼️ HERO IMAGE */
    .hero {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      display: block;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin-top: 15px;
      border-radius: 12px;
    }

    input {
      width: 85%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      margin-top: 10px;
    }

    button {
      width: 90%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    .status {
      margin-top: 15px;
      font-weight: bold;
    }

    .error { color: #f87171; }
    .ok { color: #4ade80; }

    /* 🗺️ MAP BOX */
    #mapBox {
      display: none;
      margin-top: 20px;
    }

    #mapBox img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  🏠 Libdom Villas Navigation System
</header>

<!-- 🖼️ HERO IMAGE -->
<img class="hero" src="libdom.jpg" alt="Libdom Villas">

<div class="container">

  <!-- INPUT CARD -->
  <div class="card">

    <h3>Enter Villa Number</h3>

    <input id="villaInput" placeholder="e.g. 17-a, 15-b, 101" />

    <button onclick="checkVilla()">Find Route</button>

    <div id="output" class="status"></div>

  </div>

  <!-- 🗺️ MAP -->
  <div id="mapBox">
    <h3>Navigation Map</h3>
    <img src="map.jpg" alt="Map">
  </div>

</div>

<!-- 🧠 SCRIPT -->
<script>
  function checkVilla() {
    const villa = document.getElementById("villaInput").value.trim();
    const output = document.getElementById("output");
    const mapBox = document.getElementById("mapBox");

    const validVillas = [
      "1","2","3",
      "15-a","15-b",
      "17-a","17-b",
      "101","102",
      "SECRET CODE"
    ];

    if (!villa) {
      output.className = "status error";
      output.innerText = "❌ No villa entered";
      mapBox.style.display = "none";
      return;
    }

    if (!validVillas.includes(villa)) {
      output.className = "status error";
      output.innerText = "❌ Villa does not exist";
      mapBox.style.display = "none";
      return;
    }

    output.className = "status ok";
    output.innerText = "🚚 Route ready for Villa " + villa;

    // show map
    mapBox.style.display = "block";
  }
</script>

</body>
</html>
