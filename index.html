<script>
  const params = new URLSearchParams(window.location.search);
  const villa = params.get("villa");

  const output = document.getElementById("output");

  const MIN_VILLA = 1;
  const MAX_VILLA = 199;

  if (!villa) {
    output.innerText = "No villa selected 🚪";
  } 
  else if (!/^\d+$/.test(villa)) {
    output.innerText = "❌ Invalid villa format";
  } 
  else {
    const num = Number(villa);

    if (num < MIN_VILLA || num > MAX_VILLA) {
      output.innerText = "❌ Villa does not exist";
    } else {
      output.innerText = "🚚 Route ready for Villa " + num;
    }
  }
</script>
